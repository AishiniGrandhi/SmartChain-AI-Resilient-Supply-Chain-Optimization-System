<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartChain AI | Decision Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar injected by components.js -->

    <main class="app-layout">
        <div class="main-content">
            <header class="page-header fade-in">
                <div>
                    <h1 class="page-title">AI Decision Engine</h1>
                    <p class="page-subtitle">Ask questions about your supply chain network and get actionable insights.</p>
                </div>
            </header>

            <div class="glass panel fade-in" style="animation-delay: 0.1s; max-width: 800px; margin: 0 auto; width: 100%;">
                
                <div class="chat-window" style="height: 500px;">
                    <div class="chat-messages" id="ai-chat-messages">
                        <div class="message ai">
                            Hello! I'm your SmartChain AI Consultant. I have loaded your transport context. What supply chain issues can I help you resolve today?
                        </div>
                    </div>
                    
                    <div class="chat-input-area">
                        <input type="text" id="ai-input" class="chat-input" placeholder="e.g. How should we handle the delay on route 66?">
                        <button class="chat-btn" onclick="askAI()">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <div style="margin-top: 1rem; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">
                    Powered by Google Gemini API
                </div>

            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('ai-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                askAI();
            }
        });
    </script>
</body>
</html>
