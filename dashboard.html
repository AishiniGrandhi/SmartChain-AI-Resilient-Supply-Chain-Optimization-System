<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Universal Control Tower</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar-container" data-active="dashboard"></div>

    <main class="main-content">
        <div id="header-container"></div>
        
        <div class="dashboard-grid" id="kpi-container">
            <!-- KPIs injected by JS -->
        </div>

        <div class="sections-grid">
            <div class="section-box glass animate-fade-in" style="animation-delay: 0.1s;">
                <h3>
                    <span>Operational Performance</span>
                    <i class="fas fa-chart-line" style="color: var(--accent-blue);"></i>
                </h3>
                <div style="height: calc(100% - 60px);">
                    <canvas id="chart"></canvas>
                </div>
            </div>

            <div class="section-box glass animate-fade-in" style="animation-delay: 0.2s;">
                <h3>
                    <span>Active Network Status</span>
                    <i class="fas fa-network-wired" style="color: var(--accent-purple);"></i>
                </h3>
                <div id="asset-list-container" style="overflow-y: auto; height: calc(100% - 60px);">
                    <!-- Assets injected by JS -->
                </div>
            </div>
        </div>
    </main>

    <div class="ai-fab shadow-glow" onclick="toggleAI()">
        <i class="fas fa-robot"></i>
    </div>

    <div class="ai-panel glass" id="ai-panel">
        <div class="ai-header">
            <div style="display:flex; align-items:center; gap:0.75rem;">
                <div class="pulse-dot"></div>
                <strong>AI Strategic Assistant</strong>
            </div>
            <i class="fas fa-times" onclick="toggleAI()" style="cursor:pointer;"></i>
        </div>
        <div class="ai-chat" id="chat">
            <div class="message ai">System initialized. How can I assist with your operational strategy today?</div>
        </div>
        <div id="suggested-prompts" style="padding: 0 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem;"></div>
        <div class="ai-input">
            <input type="text" id="userInput" placeholder="Ask about network status..." onkeypress="if(event.key==='Enter') getAI()">
            <button onclick="getAI()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay"></div>
    <div class="toast-container"></div>
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader"></div>
        <div class="loading-text" id="loading-text">Processing...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="data.js"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>
</html>
