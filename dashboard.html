<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Universal Control Tower</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar-container" data-active="dashboard"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <div class="dashboard-grid" id="kpi-container">
            <!-- KPIs injected by JS -->
        </div>

        <div class="sections-grid">
            <div class="section-box glass animate-fade-in" style="animation-delay: 0.1s;">
                <h3>
                    <span>Operational Performance</span>
                    <i class="fas fa-chart-line" style="color: var(--accent-blue);"></i>
                </h3>
                <canvas id="chart"></canvas>
            </div>
            <div class="section-box glass animate-fade-in" style="animation-delay: 0.2s;">
                <h3>
                    <span>Active Network Status</span>
                    <i class="fas fa-network-wired" style="color: var(--accent-purple);"></i>
                </h3>
                <div id="asset-list-container" style="overflow-y: auto; height: calc(100% - 60px);">
                    <!-- Assets injected by JS -->
                </div>
            </div>
        </div>

        <div class="section-box glass animate-fade-in" style="margin-top: 1.5rem; height: 500px; animation-delay: 0.3s;">
            <h3>
                <span>Real-time Operations Map</span>
                <i class="fas fa-map-marked-alt" style="color: var(--success);"></i>
            </h3>
            <div id="map-container">
                <div id="map" style="height: 100%;"></div>
            </div>
        </div>
    </main>

    <!-- Floating AI Assistant -->
    <div class="ai-fab" onclick="toggleAI()">
        <i class="fas fa-robot"></i>
    </div>
    
    <div class="glass ai-panel" id="ai-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3>Strategic Hub</h3>
            <i class="fas fa-times" onclick="toggleAI()" style="cursor: pointer;"></i>
        </div>
        <div class="chat-container">
            <div class="chat-messages" id="chat">
                <div class="message ai">Strategic Hub Online. Systems nominal. How can I optimize operations today?</div>
            </div>
            <div class="suggested-prompts" id="suggested-prompts">
                <!-- Prompts injected by JS -->
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Ask AI for optimization...">
                <button onclick="getAI()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Modal for adding items -->
    <div class="modal-overlay" id="modal-overlay">
        <!-- Modal content injected by JS -->
    </div>

    <div class="loading-overlay" id="loading-overlay">
        <span class="loader"></span>
        <span class="loading-text" id="loading-text">Synchronizing Global Data...</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>
</html>
