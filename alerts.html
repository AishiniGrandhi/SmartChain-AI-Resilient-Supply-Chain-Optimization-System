<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartChain AI | Alerts & Risks</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar injected by components.js -->

    <main class="app-layout">
        <div class="main-content">
            <header class="page-header fade-in">
                <div>
                    <h1 class="page-title">Live Alerts & Risk Mitigation</h1>
                    <p class="page-subtitle">Auto-updating risk feed generated by SmartChain AI.</p>
                </div>
            </header>

            <div class="glass panel fade-in" style="animation-delay: 0.1s;">
                <div class="alerts-list" id="alerts-feed" style="max-height: 70vh;">
                    <!-- Auto-populated by script.js -->
                </div>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
    <script>
        // Auto-refresh alerts every 10 seconds
        setInterval(() => {
            if (typeof generateMockAlerts === 'function') {
                const feed = document.getElementById('alerts-feed');
                if (feed) {
                    feed.style.opacity = '0.5';
                    setTimeout(() => {
                        generateMockAlerts('alerts-feed', 10);
                        feed.style.opacity = '1';
                    }, 300);
                }
            }
        }, 10000);
    </script>
</body>
</html>
