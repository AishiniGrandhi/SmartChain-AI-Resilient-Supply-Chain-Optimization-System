<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets | Universal Control Tower</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar-container" data-active="inventory"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <div class="section-box glass animate-fade-in">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3 id="inventory-title">Active Assets</h3>
                <div style="display: flex; gap: 1rem;">
                    <input type="text" id="assetSearch" placeholder="Search operations..." oninput="handleSearch()" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 8px; color: white;">
                    <button class="cta-button" style="padding: 0.5rem 1.5rem; font-size: 0.9rem;" onclick="openAddModal()">+ Add Asset</button>
                </div>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Asset ID</th>
                        <th>Name</th>
                        <th>Location</th>
                        <th>Capacity/Level</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="asset-table-body">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Floating AI Assistant -->
    <div class="ai-fab" onclick="toggleAI()">
        <i class="fas fa-robot"></i>
    </div>
    
    <div class="glass ai-panel" id="ai-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3>Strategic Hub</h3>
            <i class="fas fa-times" onclick="toggleAI()" style="cursor: pointer;"></i>
        </div>
        <div class="chat-container">
            <div class="chat-messages" id="chat">
                <div class="message ai">Strategic Hub Online. How can I help?</div>
            </div>
            <div class="chat-input">
                <input type="text" id="userInput" placeholder="Ask AI...">
                <button onclick="getAI()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay"></div>

    <div class="loading-overlay" id="loading-overlay">
        <span class="loader"></span>
        <span class="loading-text" id="loading-text">Processing Operational Data...</span>
    </div>

    <script src="data.js"></script>
    <script src="components.js"></script>
    <script src="script.js"></script>
</body>
</html>
